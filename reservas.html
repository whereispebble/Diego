<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Reservas de sesiones con Diego Assifawosen" data-i18n-content="booking.meta" />
    <title data-i18n-title="booking.meta">Reservas - Diego Assifawosen</title>
    <link rel="stylesheet" href="/styles/main.css" />
    <script src="/scripts/i18n.js" defer></script>
    <script src="/scripts/components/site-layout.js" defer></script>
  </head>
  <body>
    <site-header active-page="booking"></site-header>

    <main>
      <section class="page">
        <div class="inner">
          <header class="inner-header">
            <h1 data-i18n="booking.title">Reservas</h1>
            <p data-i18n="booking.intro">Sesiones editoriales, comerciales, test shoots y disponibilidad para proyectos.</p>
          </header>

          <div class="booking-grid">
            <div class="booking-panel">
              <span class="booking-kicker" data-i18n="booking.calendar">Google Calendar</span>
              <p data-i18n="booking.copy">
                Elige un hueco disponible y confirma la sesion directamente desde la agenda.
              </p>
              <a class="booking-button" href="#" data-placeholder-link data-i18n="booking.button">
                Reservar sesion
              </a>
            </div>

            <div class="booking-details">
              <div>
                <span data-i18n="booking.duration">Duracion</span>
                <strong>60 min</strong>
              </div>
              <div>
                <span data-i18n="booking.base">Base</span>
                <strong>Madrid</strong>
              </div>
              <div>
                <span data-i18n="booking.contact">Contacto</span>
                <a href="mailto:contacto@tudominio.com" data-i18n="booking.directEmail">Email directo</a>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <site-footer></site-footer>
  </body>
</html>
